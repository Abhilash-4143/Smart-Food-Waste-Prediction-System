<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Food Waste Prediction</title>
    <meta name="description" content="AI-powered meal forecasting to optimize food preparation and reduce waste">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="/static/favicon.ico">
</head>
 
<body>
 
<div class="bg-gradient"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>
 
<div class="floating-elements">
    <span class="float-item float-1">🍎</span>
    <span class="float-item float-2">🥗</span>
    <span class="float-item float-3">🍕</span>
    <span class="float-item float-4">🥕</span>
    <span class="float-item float-5">🍞</span>
    <span class="float-item float-6">🥦</span>
</div>
 
<main class="container">
 
    <header class="header">
        <span class="badge">Intelligent Food Planning by Abhilash</span>
        <h1 class="title">
            <span class="title-gradient">Smart Food Waste</span><br>
            Prediction System
        </h1>
        <p class="subtitle">Optimize your meal preparation with intelligent forecasting</p>
    </header>
 
    <div class="card glass">
 
        <form action="/predict" method="post" class="form">
 
            <div class="form-grid">
 
                <div class="form-group">
                    <label class="label" for="day">Day of Week</label>
                    <select id="day" name="day" class="input select">
                        <option value="0">Monday</option>
                        <option value="1">Tuesday</option>
                        <option value="2">Wednesday</option>
                        <option value="3">Thursday</option>
                        <option value="4">Friday</option>
                        <option value="5">Saturday</option>
                        <option value="6">Sunday</option>
                    </select>
                </div>
 
                <div class="form-group">
                    <label class="label" for="festival">Festival</label>
                    <select id="festival" name="festival" class="input select">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
 
                <div class="form-group">
                    <label class="label" for="weather">Weather</label>
                    <select id="weather" name="weather" class="input select">
                        <option value="0">☀️ Sunny</option>
                        <option value="1">⛅ Cloudy</option>
                        <option value="2">🌧️ Rainy</option>
                        <option value="3">⛈️ Stormy</option>
                    </select>
                </div>
 
                <div class="form-group">
                    <label class="label" for="customers">Expected Customers</label>
                    <input id="customers" type="number" name="customers" class="input" placeholder="e.g. 120" min="0">
                </div>
 
                <div class="form-group">
                    <label class="label" for="prev_day">Previous Day Consumption</label>
                    <input id="prev_day" type="number" name="prev_day" class="input" placeholder="e.g. 95" min="0">
                </div>
 
                <div class="form-group">
                    <label class="label" for="prev_week">Previous Week Same Day</label>
                    <input id="prev_week" type="number" name="prev_week" class="input" placeholder="e.g. 110" min="0">
                </div>
 
            </div>
 
            <button type="submit" class="btn">⚡ Generate Prediction</button>
 
        </form>
 
        <div class="divider"></div>
 
        <div class="result">
            <h2>{{ prediction_text }}</h2>
        </div>
 
    </div>
 
    <footer class="footer">
        <p>Designed & Developed by Abhilash</p>
    </footer>
 
</main>
 
</body>
</html>
